<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Jack - 3D Earth</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Inline SVG favicon: a night globe with a blue rim and city lights. -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='15' fill='%230a1a33'/%3E%3Ccircle cx='16' cy='16' r='15' fill='none' stroke='%233b82f6' stroke-width='2' opacity='0.85'/%3E%3Ccircle cx='12' cy='12' r='1.2' fill='%23fde68a'/%3E%3Ccircle cx='18.5' cy='13.5' r='1.2' fill='%23fde68a'/%3E%3Ccircle cx='13.5' cy='19' r='1.2' fill='%23fde68a'/%3E%3Ccircle cx='20' cy='20.5' r='1.2' fill='%23fff7d6'/%3E%3C/svg%3E">
  <style>
    body {
      margin: 0;
      background: #05070f;
      overflow: hidden;
      font-family: "Inter", sans-serif;
      color: #e2e8f0;
    }

    #earth-container {
      width: 100vw;
      height: 100vh;
    }

    .overlay {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 10;
      background: rgba(5,7,15,0.8);
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid #1e293b;
      font-size: 0.9rem;
    }

    .overlay h1 {
      margin: 0 0 4px;
      font-size: 1.1rem;
    }

    .overlay p {
      margin: 0 0 10px;
      color: #94a3b8;
    }

    .overlay a.map-link {
      display: inline-block;
      text-decoration: none;
      color: #e2e8f0;
      background: #0f1b2e;
      border: 1px solid #334155;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 0.82rem;
    }
    .overlay a.map-link:hover { background: #1e3a5f; }

    #tooltip {
      position: fixed;
      pointer-events: none;
      z-index: 20;
      display: none;
      transform: translate(16px, 16px);
      background: rgba(5,7,15,0.92);
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 0.85rem;
      color: #e2e8f0;
      min-width: 150px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.5);
    }
    #tooltip .c-name { font-weight: 600; margin-bottom: 3px; }
    #tooltip .c-row { color: #94a3b8; font-size: 0.78rem; line-height: 1.4; }

    #zoomhint {
      position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%);
      z-index: 15; display: none; pointer-events: none;
      background: rgba(5,7,15,0.85); border: 1px solid #334155; border-radius: 20px;
      padding: 8px 16px; font-size: 0.82rem; color: #e2e8f0;
      animation: hintpulse 1.6s ease-in-out infinite;
    }
    @keyframes hintpulse { 0%,100% { opacity: 0.55; } 50% { opacity: 1; } }
  </style>
</head>
<body>
  <div class="overlay">
    <h1>Jack — Web Developer</h1>
    <p>A connected world — drag the Earth to explore the network.</p>
    <a class="map-link" href="map.html">🏙️ Zoom to buildings →</a>
  </div>

  <div id="earth-container"></div>
  <div id="tooltip"></div>
  <div id="zoomhint">Keep scrolling to drop into 3D buildings ↓</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <!-- Maps a lat/lng to its IANA timezone, so the displayed time is DST-aware. -->
  <script src="https://cdn.jsdelivr.net/npm/tz-lookup/tz.js"></script>

  <script>
    const container = document.getElementById("earth-container");

    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(
      50,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.z = 3;

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);

    // Direction the sunlight comes from (world space). Pointing straight along
    // +X puts the terminator down the middle of the view: right half daylit,
    // left half night. The Earth spins underneath this fixed sun.
    const SUN_DIRECTION = new THREE.Vector3(1.0, 0.0, 0.0).normalize();

    // High-res 4K NASA imagery (4096x2048) from the three-globe asset set,
    // served with CORS headers so it loads on the live site. Max anisotropic
    // filtering keeps it sharp when you zoom in at a grazing angle.
    const loader = new THREE.TextureLoader();
    loader.setCrossOrigin("anonymous");
    const maxAniso = renderer.capabilities.getMaxAnisotropy();
    const load = (url) => {
      const t = loader.load(url);
      t.anisotropy = maxAniso;
      return t;
    };

    const dayMap = load("https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg");
    const nightMap = load("https://unpkg.com/three-globe/example/img/earth-night.jpg");

    // This group holds the Earth so dragging spins it.
    const globe = new THREE.Group();
    scene.add(globe);

    // --- Earth: custom shader blends a sunlit day side into a city-lit night
    //     side across a soft terminator, with sun glint on the oceans. ---
    const earthGeometry = new THREE.SphereGeometry(1, 96, 96);
    const earthMaterial = new THREE.ShaderMaterial({
      uniforms: {
        dayTexture: { value: dayMap },
        nightTexture: { value: nightMap },
        sunDirection: { value: SUN_DIRECTION },
        uTime: { value: 0 }
      },
      vertexShader: `
        varying vec2 vUv;
        varying vec3 vNormalW;
        varying vec3 vPositionW;
        void main() {
          vUv = uv;
          vNormalW = normalize(mat3(modelMatrix) * normal);
          vPositionW = (modelMatrix * vec4(position, 1.0)).xyz;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        uniform sampler2D dayTexture;
        uniform sampler2D nightTexture;
        uniform vec3 sunDirection;
        uniform float uTime;
        varying vec2 vUv;
        varying vec3 vNormalW;

        // Cheap hash giving each map cell its own random phase.
        float hash(vec2 p) {
          return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
        }
        // Smooth value noise — interpolated, so there are no hard cell edges
        // (a raw floor()-grid hash is what made the dark side look tiled).
        float vnoise(vec2 p) {
          vec2 i = floor(p), f = fract(p);
          f = f * f * (3.0 - 2.0 * f);
          float a = hash(i), b = hash(i + vec2(1.0, 0.0));
          float c = hash(i + vec2(0.0, 1.0)), d = hash(i + vec2(1.0, 1.0));
          return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
        }

        void main() {
          vec3 normal = normalize(vNormalW);
          float sun = dot(normal, normalize(sunDirection));
          float dayAmount = smoothstep(-0.12, 0.20, sun); // soft terminator

          vec3 surface = texture2D(dayTexture, vUv).rgb;
          vec3 lights = texture2D(nightTexture, vUv).rgb;

          // Show ONLY the bright city cores. Dropping the faint background glow
          // removes the blocky/tiled look in the dark areas. Lights are steady —
          // nothing animates, the planet is simply shown as-is.
          float lum = max(lights.r, max(lights.g, lights.b));
          float cityMask = smoothstep(0.25, 0.45, lum);
          vec3 cities = lights * cityMask * 1.8 * (1.0 - dayAmount);

          // Faint moonlit surface so the dark side's continents stay visible
          // (this is the smooth day photo dimmed — no tiling).
          vec3 nightColor = surface * 0.15 * vec3(0.85, 0.9, 1.05) + cities;
          vec3 dayColor = surface;

          vec3 color = mix(nightColor, dayColor, dayAmount);
          gl_FragColor = vec4(color, 1.0);
        }
      `
    });
    const earth = new THREE.Mesh(earthGeometry, earthMaterial);
    globe.add(earth);

    // --- Global network: glowing city nodes connected by arcs with data
    //     pulses travelling along them, like internet traffic. ---
    const NETWORK_COLOR = 0x4cc9ff;

    // Convert latitude/longitude to a point on the globe's surface.
    function latLngToVector3(lat, lng, radius) {
      const phi = (90 - lat) * Math.PI / 180;
      const theta = (lng + 180) * Math.PI / 180;
      return new THREE.Vector3(
        -radius * Math.sin(phi) * Math.cos(theta),
        radius * Math.cos(phi),
        radius * Math.sin(phi) * Math.sin(theta)
      );
    }

    const CITIES = [
      { lat: 40.71, lng: -74.0 },   // New York
      { lat: 51.51, lng: -0.13 },   // London
      { lat: 35.68, lng: 139.69 },  // Tokyo
      { lat: 1.35, lng: 103.82 },   // Singapore
      { lat: -33.87, lng: 151.21 }, // Sydney
      { lat: 37.77, lng: -122.42 }, // San Francisco
      { lat: 55.75, lng: 37.62 },   // Moscow
      { lat: 19.08, lng: 72.88 },   // Mumbai
      { lat: -23.55, lng: -46.63 }, // São Paulo
      { lat: 25.2, lng: 55.27 },    // Dubai
      { lat: 30.04, lng: 31.24 },   // Cairo
      { lat: -26.2, lng: 28.04 },   // Johannesburg
      { lat: 48.85, lng: 2.35 },    // Paris
      { lat: 39.9, lng: 116.4 },    // Beijing
      { lat: 34.05, lng: -118.24 }, // Los Angeles
      { lat: -34.6, lng: -58.38 }   // Buenos Aires
    ];

    const networkGroup = new THREE.Group();
    globe.add(networkGroup);

    // Small glowing node at each city.
    const nodeGeo = new THREE.SphereGeometry(0.005, 12, 12);
    const nodeMat = new THREE.MeshBasicMaterial({
      color: 0xbfeaff,
      transparent: true,
      opacity: 0.85,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    });
    CITIES.forEach((c) => {
      const node = new THREE.Mesh(nodeGeo, nodeMat);
      node.position.copy(latLngToVector3(c.lat, c.lng, 1.004));
      networkGroup.add(node);
    });

    // Seeded RNG so the network looks the same each load.
    let nseed = 7;
    const nrand = () => { nseed = (nseed * 16807) % 2147483647; return nseed / 2147483647; };

    // Faint static arcs sit beneath the moving light trails.
    const arcMat = new THREE.LineBasicMaterial({
      color: 0x2b6c93,
      transparent: true,
      opacity: 0.2,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    });

    // Each data packet is a short comet-trail that fades out toward its tail.
    const TRAIL_SEGMENTS = 22;
    const TRAIL_LENGTH = 0.09;        // fraction of the arc the trail spans
    const TRAIL_COLOR = new THREE.Color(0xaff0ff);
    const _tmpVec = new THREE.Vector3();

    const pulses = [];
    for (let i = 0; i < 24; i++) {
      const a = CITIES[Math.floor(nrand() * CITIES.length)];
      const b = CITIES[Math.floor(nrand() * CITIES.length)];
      if (a === b) continue;

      const startV = latLngToVector3(a.lat, a.lng, 1.004);
      const endV = latLngToVector3(b.lat, b.lng, 1.004);
      const dist = startV.distanceTo(endV);
      // Lift the arc's control point off the surface — farther cities arc higher.
      const mid = startV.clone().add(endV).multiplyScalar(0.5)
        .normalize().multiplyScalar(1.004 + dist * 0.45);
      const curve = new THREE.QuadraticBezierCurve3(startV, mid, endV);

      networkGroup.add(new THREE.Line(
        new THREE.BufferGeometry().setFromPoints(curve.getPoints(64)),
        arcMat
      ));

      // Trail geometry: positions + per-vertex colours, refreshed every frame.
      const positions = new Float32Array((TRAIL_SEGMENTS + 1) * 3);
      const colors = new Float32Array((TRAIL_SEGMENTS + 1) * 3);
      const trailGeo = new THREE.BufferGeometry();
      trailGeo.setAttribute("position", new THREE.BufferAttribute(positions, 3));
      trailGeo.setAttribute("color", new THREE.BufferAttribute(colors, 3));
      networkGroup.add(new THREE.Line(trailGeo, new THREE.LineBasicMaterial({
        vertexColors: true,
        transparent: true,
        blending: THREE.AdditiveBlending,
        depthWrite: false
      })));

      pulses.push({
        curve, geo: trailGeo, positions, colors,
        t: nrand(), speed: 0.0022 + nrand() * 0.0028
      });
    }

    // --- Atmosphere: a back-faced fresnel shell that glows at the rim. ---
    const atmosphere = new THREE.Mesh(
      new THREE.SphereGeometry(1.18, 96, 96),
      new THREE.ShaderMaterial({
        side: THREE.BackSide,
        blending: THREE.AdditiveBlending,
        transparent: true,
        depthWrite: false,
        vertexShader: `
          varying vec3 vNormal;
          void main() {
            vNormal = normalize(normalMatrix * normal);
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          varying vec3 vNormal;
          void main() {
            float intensity = pow(0.62 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 3.0);
            gl_FragColor = vec4(0.35, 0.6, 1.0, 1.0) * intensity;
          }
        `
      })
    );
    scene.add(atmosphere);

    // All of space (nebula + stars) lives in one group so it can drift slowly.
    const space = new THREE.Group();
    scene.add(space);

    // --- Deep space: a faint nebula backdrop wrapped around the whole scene. ---
    (function addNebula() {
      const canvas = document.createElement("canvas");
      canvas.width = 2048;
      canvas.height = 1024;
      const ctx = canvas.getContext("2d");
      const w = canvas.width, h = canvas.height;

      // Near-black base.
      ctx.fillStyle = "#02030a";
      ctx.fillRect(0, 0, w, h);

      let s = 24571;
      const rnd = () => { s = (s * 16807) % 2147483647; return s / 2147483647; };

      // A few large, very soft clouds of interstellar gas.
      const tints = [
        [40, 70, 140], [70, 40, 120], [30, 90, 110], [90, 50, 100]
      ];
      for (let i = 0; i < 22; i++) {
        const cx = rnd() * w, cy = rnd() * h;
        const rad = 120 + rnd() * 380;
        const c = tints[Math.floor(rnd() * tints.length)];
        const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, rad);
        g.addColorStop(0, `rgba(${c[0]},${c[1]},${c[2]},${0.05 + rnd() * 0.06})`);
        g.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(cx, cy, rad, 0, Math.PI * 2);
        ctx.fill();
      }

      // Dense field of faint pin-prick stars baked into the backdrop.
      for (let i = 0; i < 4000; i++) {
        const x = rnd() * w, y = rnd() * h;
        const a = 0.2 + rnd() * 0.5;
        ctx.fillStyle = `rgba(255,255,255,${a})`;
        ctx.fillRect(x, y, rnd() < 0.1 ? 2 : 1, 1);
      }

      const tex = new THREE.CanvasTexture(canvas);
      const sky = new THREE.Mesh(
        new THREE.SphereGeometry(400, 64, 64),
        new THREE.MeshBasicMaterial({ map: tex, side: THREE.BackSide })
      );
      space.add(sky);
    })();

    // --- Foreground stars: soft round points, layered by size/brightness/colour
    //     so the sky has depth instead of a flat sheet of identical dots. ---
    (function addStars() {
      // Soft circular sprite so stars are round glows, not hard squares.
      const sprite = (() => {
        const c = document.createElement("canvas");
        c.width = c.height = 64;
        const g = c.getContext("2d").createRadialGradient(32, 32, 0, 32, 32, 32);
        g.addColorStop(0, "rgba(255,255,255,1)");
        g.addColorStop(0.25, "rgba(255,255,255,0.85)");
        g.addColorStop(1, "rgba(255,255,255,0)");
        const ctx = c.getContext("2d");
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, 64, 64);
        return new THREE.CanvasTexture(c);
      })();

      let s = 1337;
      const rnd = () => { s = (s * 16807) % 2147483647; return s / 2147483647; };

      function layer(count, size, opacity, tint) {
        const positions = new Float32Array(count * 3);
        for (let i = 0; i < count; i++) {
          const r = 80 + rnd() * 200;
          const theta = rnd() * Math.PI * 2;
          const phi = Math.acos(2 * rnd() - 1);
          positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
          positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
          positions[i * 3 + 2] = r * Math.cos(phi);
        }
        const geo = new THREE.BufferGeometry();
        geo.setAttribute("position", new THREE.BufferAttribute(positions, 3));
        space.add(new THREE.Points(geo, new THREE.PointsMaterial({
          map: sprite,
          size,
          color: tint,
          transparent: true,
          opacity,
          depthWrite: false,
          blending: THREE.AdditiveBlending,
          sizeAttenuation: true
        })));
      }

      layer(3500, 0.7, 0.55, 0xffffff);  // distant dim field
      layer(700, 1.4, 0.8, 0xdde8ff);    // mid, slightly blue
      layer(140, 2.6, 1.0, 0xfff2dd);    // bright, slightly warm
    })();


    // --- Drag-to-rotate, implemented in code (no external OrbitControls) ---
    let isDragging = false;
    let lastX = 0;
    let lastY = 0;
    let velX = 0; // horizontal spin velocity (radians/frame)
    let velY = 0; // vertical tilt velocity
    const ROTATE_SPEED = 0.005;
    const DAMPING = 0.92;      // how quickly the throw slows down
    const MAX_TILT = Math.PI / 2 - 0.05; // don't let the poles flip over

    const dom = renderer.domElement;
    dom.style.cursor = "grab";

    dom.addEventListener("pointerdown", (e) => {
      isDragging = true;
      lastX = e.clientX;
      lastY = e.clientY;
      velX = 0;
      velY = 0;
      dom.style.cursor = "grabbing";
      dom.setPointerCapture(e.pointerId);
    });

    dom.addEventListener("pointermove", (e) => {
      if (!isDragging) return;
      const dx = e.clientX - lastX;
      const dy = e.clientY - lastY;
      lastX = e.clientX;
      lastY = e.clientY;
      velX = dx * ROTATE_SPEED;
      velY = dy * ROTATE_SPEED;
      globe.rotation.y += velX;
      globe.rotation.x += velY;
    });

    const endDrag = () => {
      isDragging = false;
      dom.style.cursor = "grab";
    };
    dom.addEventListener("pointerup", endDrag);
    dom.addEventListener("pointercancel", endDrag);

    // --- Scroll to zoom; keep scrolling in at full zoom to fly into 3D buildings. ---
    const ZOOM_MIN = 1.25, ZOOM_MAX = 8;
    const zoomHint = document.getElementById("zoomhint");
    dom.addEventListener("wheel", (e) => {
      e.preventDefault();
      // At the closest zoom, a further zoom-in flies into the Cesium 3D building
      // map, centred on whatever is in the middle of the screen.
      if (e.deltaY < 0 && camera.position.z <= ZOOM_MIN + 0.02) {
        const r = dom.getBoundingClientRect();
        const ll = pickLatLng(r.left + r.width / 2, r.top + r.height / 2);
        const q = ll ? `?lat=${ll.lat.toFixed(5)}&lng=${ll.lng.toFixed(5)}` : "";
        window.location.href = "map.html" + q;
        return;
      }
      camera.position.z = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, camera.position.z + e.deltaY * 0.002));
      zoomHint.style.display = camera.position.z <= ZOOM_MIN + 0.05 ? "block" : "none";
    }, { passive: false });

    // ===== Hover a country: highlight its border + show name/capital/time =====
    const tooltip = document.getElementById("tooltip");
    const raycaster = new THREE.Raycaster();
    const ndc = new THREE.Vector2();
    let hoveringGlobe = false;     // pauses auto-rotation while true
    let countryFeatures = [];      // [{ name, polys, bbox }]
    const capitalByName = {};      // normalised country name -> capital city
    let currentCountry = null;     // name of the highlighted country
    let borderLines = null;        // THREE.Group of the current border
    let hoverLat = null;           // latitude under cursor (for live time)
    let hoverLng = null;           // longitude under cursor (for live time)

    const normName = (s) => s.toLowerCase().replace(/[^a-z]/g, "");
    // Bridge the few names that differ between the two datasets.
    const ALIAS = {
      unitedstatesofamerica: "unitedstates",
      unitedrepublicoftanzania: "tanzania",
      republicofserbia: "serbia",
      republicofthecongo: "congo",
      czechia: "czechrepublic",
      macedonia: "macedonia",
      lao: "laos",
      syrianarabrepublic: "syria",
      bruneidarussalam: "brunei"
    };
    const capLookup = (name) => {
      const n = normName(name);
      return capitalByName[n] || capitalByName[ALIAS[n] || ""] || "—";
    };

    // Load capitals (keyed by country name).
    fetch("https://cdn.jsdelivr.net/gh/samayo/country-json@master/src/country-by-capital-city.json")
      .then((r) => r.json())
      .then((list) => list.forEach((o) => { capitalByName[normName(o.country)] = o.city; }))
      .catch(() => {});

    // Load country borders and pre-compute a bounding box for fast hit-testing.
    fetch("https://cdn.jsdelivr.net/gh/johan/world.geo.json@master/countries.geo.json")
      .then((r) => r.json())
      .then((gj) => {
        countryFeatures = gj.features.map((f) => {
          const polys = [];
          const g = f.geometry;
          if (g.type === "Polygon") polys.push(g.coordinates);
          else if (g.type === "MultiPolygon") g.coordinates.forEach((p) => polys.push(p));
          let minLng = 180, minLat = 90, maxLng = -180, maxLat = -90;
          polys.forEach((rings) => rings[0].forEach(([lng, lat]) => {
            if (lng < minLng) minLng = lng;
            if (lng > maxLng) maxLng = lng;
            if (lat < minLat) minLat = lat;
            if (lat > maxLat) maxLat = lat;
          }));
          return { name: f.properties.name, polys, bbox: [minLng, minLat, maxLng, maxLat] };
        });
      })
      .catch(() => {});

    // Raycast the mouse onto the globe and return the lat/lng under it.
    function pickLatLng(clientX, clientY) {
      const rect = dom.getBoundingClientRect();
      ndc.x = ((clientX - rect.left) / rect.width) * 2 - 1;
      ndc.y = -((clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(ndc, camera);
      const hits = raycaster.intersectObject(earth, false);
      if (!hits.length) return null;
      const p = earth.worldToLocal(hits[0].point.clone()).normalize();
      const lat = 90 - Math.acos(p.y) * 180 / Math.PI;
      let lng = Math.atan2(p.z, -p.x) * 180 / Math.PI - 180;
      if (lng < -180) lng += 360;
      if (lng > 180) lng -= 360;
      return { lat, lng };
    }

    // Even-odd ray-casting point-in-polygon test.
    function pointInRing(lng, lat, ring) {
      let inside = false;
      for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
        const xi = ring[i][0], yi = ring[i][1], xj = ring[j][0], yj = ring[j][1];
        if (((yi > lat) !== (yj > lat)) && (lng < (xj - xi) * (lat - yi) / (yj - yi) + xi)) {
          inside = !inside;
        }
      }
      return inside;
    }
    function findCountry(lng, lat) {
      for (const f of countryFeatures) {
        const b = f.bbox;
        if (lng < b[0] || lng > b[2] || lat < b[1] || lat > b[3]) continue;
        for (const rings of f.polys) {
          if (pointInRing(lng, lat, rings[0])) {
            let inHole = false;
            for (let h = 1; h < rings.length; h++) {
              if (pointInRing(lng, lat, rings[h])) { inHole = true; break; }
            }
            if (!inHole) return f;
          }
        }
      }
      return null;
    }

    function buildBorder(f) {
      const group = new THREE.Group();
      const mat = new THREE.LineBasicMaterial({
        color: 0xffe066, transparent: true, opacity: 0.95, depthWrite: false
      });
      f.polys.forEach((rings) => rings.forEach((ring) => {
        const pts = ring.map(([lng, lat]) => latLngToVector3(lat, lng, 1.003));
        group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), mat));
      }));
      return group;
    }
    function clearBorder() {
      if (borderLines) {
        globe.remove(borderLines);
        borderLines.traverse((o) => { if (o.geometry) o.geometry.dispose(); });
        borderLines = null;
      }
      currentCountry = null;
    }

    // Accurate, DST-aware local time from the real IANA timezone at this point.
    function localTimeStr(lat, lng) {
      try {
        if (typeof tzlookup === "function") {
          const tz = tzlookup(lat, lng);
          const parts = new Intl.DateTimeFormat("en-GB", {
            timeZone: tz, hour: "2-digit", minute: "2-digit",
            hour12: false, timeZoneName: "shortOffset"
          }).formatToParts(new Date());
          const get = (t) => (parts.find((p) => p.type === t) || {}).value || "";
          return `${get("hour")}:${get("minute")} (${get("timeZoneName")})`;
        }
      } catch (e) { /* fall through to the longitude estimate */ }
      // Fallback: approximate from longitude (rounded to the nearest hour).
      const now = new Date();
      const utcMs = now.getTime() + now.getTimezoneOffset() * 60000;
      const offsetH = Math.round(lng / 15);
      const d = new Date(utcMs + offsetH * 3600000);
      const hh = String(d.getHours()).padStart(2, "0");
      const mm = String(d.getMinutes()).padStart(2, "0");
      return `${hh}:${mm} (UTC${offsetH >= 0 ? "+" : ""}${offsetH})`;
    }

    function hideHover() {
      hoveringGlobe = false;
      hoverLat = null;
      hoverLng = null;
      tooltip.style.display = "none";
      clearBorder();
    }

    dom.addEventListener("pointermove", (e) => {
      if (isDragging) { hideHover(); return; }
      const ll = pickLatLng(e.clientX, e.clientY);
      if (!ll) { hideHover(); return; }
      hoveringGlobe = true; // over the globe -> pause auto-rotation
      const f = findCountry(ll.lng, ll.lat);
      if (!f) { hoverLng = null; tooltip.style.display = "none"; clearBorder(); return; }

      if (f.name !== currentCountry) {
        clearBorder();
        currentCountry = f.name;
        borderLines = buildBorder(f);
        globe.add(borderLines);
      }
      hoverLat = ll.lat;
      hoverLng = ll.lng;
      tooltip.innerHTML =
        `<div class="c-name">${f.name}</div>` +
        `<div class="c-row">Capital: ${capLookup(f.name)}</div>` +
        `<div class="c-row">Local time: <span id="c-time">${localTimeStr(ll.lat, ll.lng)}</span></div>`;
      tooltip.style.left = e.clientX + "px";
      tooltip.style.top = e.clientY + "px";
      tooltip.style.display = "block";
    });
    dom.addEventListener("pointerleave", hideHover);

    // Keep the displayed time ticking while the cursor sits still.
    setInterval(() => {
      if (tooltip.style.display === "block" && hoverLng !== null) {
        const el = document.getElementById("c-time");
        if (el) el.textContent = localTimeStr(hoverLat, hoverLng);
      }
    }, 1000);

    function animate() {
      requestAnimationFrame(animate);

      // Drive the city-light flicker.
      earthMaterial.uniforms.uTime.value = performance.now() * 0.001;

      if (!isDragging) {
        // Inertia: keep spinning from the last drag, then settle into a slow idle spin.
        globe.rotation.y += velX;
        globe.rotation.x += velY;
        velX *= DAMPING;
        velY *= DAMPING;
        if (Math.abs(velX) < 0.0008) velX = 0;
        if (Math.abs(velY) < 0.0008) velY = 0;
        if (!hoveringGlobe) globe.rotation.y += 0.0006; // auto-rotate, paused on hover
      }

      // Clamp the tilt so you can't flip the globe upside-down.
      globe.rotation.x = Math.max(-MAX_TILT, Math.min(MAX_TILT, globe.rotation.x));

      // Slowly drift the whole starfield for a sense of motion through space.
      space.rotation.y += 0.00018;
      space.rotation.x += 0.00005;

      // Advance each data packet and redraw its fading comet-trail.
      for (const p of pulses) {
        p.t = (p.t + p.speed) % 1;
        for (let i = 0; i <= TRAIL_SEGMENTS; i++) {
          const frac = i / TRAIL_SEGMENTS;            // 0 = tail, 1 = head
          let tt = p.t - (1 - frac) * TRAIL_LENGTH;
          if (tt < 0) tt = 0;
          p.curve.getPoint(tt, _tmpVec);
          p.positions[i * 3] = _tmpVec.x;
          p.positions[i * 3 + 1] = _tmpVec.y;
          p.positions[i * 3 + 2] = _tmpVec.z;
          const b = frac * frac;                      // brightness fades toward the tail
          p.colors[i * 3] = TRAIL_COLOR.r * b;
          p.colors[i * 3 + 1] = TRAIL_COLOR.g * b;
          p.colors[i * 3 + 2] = TRAIL_COLOR.b * b;
        }
        p.geo.attributes.position.needsUpdate = true;
        p.geo.attributes.color.needsUpdate = true;
      }

      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
